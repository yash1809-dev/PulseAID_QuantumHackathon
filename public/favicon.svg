<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Shield body -->
  <path d="M50 8 L85 22 L85 52 Q85 75 50 92 Q15 75 15 52 L15 22 Z"
        fill="url(#shieldGrad)" filter="url(#glow)" opacity="0.95"/>
  <!-- Shield inner border -->
  <path d="M50 14 L79 26 L79 52 Q79 71 50 86 Q21 71 21 52 L21 26 Z"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Medical cross -->
  <rect x="38" y="30" width="24" height="40" rx="4" fill="white" opacity="0.95"/>
  <rect x="28" y="40" width="44" height="20" rx="4" fill="white" opacity="0.95"/>
  <!-- Heartbeat/ECG line over cross -->
  <polyline points="28,50 34,50 37,42 41,58 45,44 50,56 53,50 72,50"
            fill="none" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>